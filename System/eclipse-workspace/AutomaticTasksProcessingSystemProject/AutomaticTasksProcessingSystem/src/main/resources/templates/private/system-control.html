<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
<div th:replace="~{fragments/head.html :: head(#{systemcontrol.title})}"></div>
</head>
<body>
	<div class="container">
		<header>
			<img th:src="@{/images/rubik.png}" alt="Rubik" />
			<h1 th:text="#{common.header}"></h1>
		</header>
		<nav>
			<ul>
				<li class="right"><a th:href="@{/}" id="home" th:text="#{common.home}"></a></li>
			</ul>
		</nav>
		<main>
			<fieldset>
				<legend>
					<b th:text="#{systemcontrol.title}"></b>
				</legend>
				<form method="post" th:action="@{/system-control}" th:object="${engineState}">
					<fieldset>
						<legend>
							<b th:text="#{systemcontrol.enginestate}"></b>
						</legend>
						<div class="row">
							<div class="column">
								<input type="text" id="engineState" th:field="*{state}" readonly>
							</div>
							<div sec:authorize="hasAuthority('ADMIN')" class="column">
								<input type="submit" th:value="#{systemcontrol.changestate}" />
							</div>
							<div sec:authorize="!hasAuthority('ADMIN')" class="column">
								<input type="submit" th:value="#{systemcontrol.changestate}" disabled="disabled"/>
							</div>
						</div>
					</fieldset>
				</form>
			</fieldset>
		</main>
		<footer th:replace="~{fragments/footer.html :: footer}"> </footer>
	</div>
</body>
</html>
